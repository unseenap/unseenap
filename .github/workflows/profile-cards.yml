name: Update profile cards

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/generate-profile-cards.mjs
      - .github/workflows/profile-cards.yml

permissions:
  contents: write

concurrency:
  group: profile-card-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate live profile cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-profile-cards.mjs

      - name: Commit refreshed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-overview.svg assets/language-focus.svg assets/github-streak.svg
          if git diff --cached --quiet; then
            echo "Profile cards are already current."
          else
            git commit -m "chore: refresh profile cards"
            git push
          fi
